{
    "server": {
        "base_url": "https://xdev.arkcom.ru:9999",
        "api_path": "/app/webagent1/api",
        "registration_endpoint": "/wa_reg/",
        "task_endpoint": "/wa_task/",
        "result_endpoint": "/wa_result/",
        "connection_timeout": 30,
        "request_timeout": 60,
        "verify_ssl": true,
        "ca_bundle_path": "/etc/ssl/certs/ca-certificates.crt"
    },
    
    "polling": {
        "base_interval": 60,
        "max_interval": 3600,
        "backoff_multiplier": 2.0,
        "max_retries": 3,
        "registration_retries": 3,
        "result_retries": 3
    },
    
    "execution": {
        "task_dir": "./tasks",
        "result_dir": "./results",
        "temp_dir": "./tmp",
        "log_dir": "./logs",
        "process_timeout": 300,
        "file_upload_timeout": 120,
        "max_output_size": 10485760,
        "allowed_commands": ["ls", "cat", "echo", "uname"],
        "sandbox_mode": true
    },
    
    "logging": {
        "console_level": "INFO",
        "file_level": "DEBUG",
        "log_file": "./logs/agent.log",
        "max_file_size_mb": 100,
        "max_files_rotation": 5,
        "structured_json": false
    },
    
    "identity": {
        "uid": "007",
        "description": "web-agent-production",
        "version": "2.0.0"
    }
}
